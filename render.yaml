# Render Blueprint — deploys the platform as two always-on web services (no paid database:
# the backend uses SQLite and re-seeds the 11,343 projects + researched market snapshots on boot).
#
# Deploy: push this repo to GitHub -> Render Dashboard -> New + -> Blueprint -> pick the repo ->
# Apply. Then set ANTHROPIC_API_KEY on the cbi-backend service (it's marked sync:false = secret).
services:
  - type: web
    name: cbi-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/cbi.db
      - key: RESEARCH_AUTH_MODE
        value: api_key
      - key: RESEARCH_MODEL
        value: claude-opus-4-8
      - key: RESEARCH_AUTO_MAX_PROJECTS
        value: "10"
      - key: SEED_CSV_PATH
        value: /app/data/seed/projects.csv
      - key: SEED_RESEARCH_GLOB
        value: /app/data/seed/*_research.json
      - key: SEED_REGISTRY_CSV
        value: /app/data/seed/offsetsdb_retirements.csv
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false   # set this in the Render dashboard (secret) after first deploy

  - type: web
    name: cbi-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      # Full public URL of the backend service (fromService `host` omits the .onrender.com suffix).
      # If you rename/redeploy the backend to a different URL, update this value.
      - key: BACKEND_URL
        value: https://cbi-backend-s56a.onrender.com
